name: Build and Publish Linux Packages

on:
  release:
    types: [published]
  push:
    branches: [main]
    tags:
      - 'v*'
  workflow_dispatch: # Allows manual trigger for testing

jobs:
  build_linux:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install Ruby and FPM
        run: |
          sudo apt-get update
          sudo apt-get install -y ruby ruby-dev rubygems build-essential
          sudo gem install fpm

      - name: Prepare Package Payload (FPM)
        run: |
          mkdir -p deb_build/usr/bin
          mkdir -p deb_build/usr/share/filebrowser
          mkdir -p deb_build/usr/share/applications
          
          # Copy source code
          cp -r src deb_build/usr/share/filebrowser/
          
          # Create wrapper executable
          cat << 'EOF' > deb_build/usr/bin/filebrowser
          #!/bin/bash
          export PYTHONPATH="/usr/share/filebrowser"
          exec python3 -m src.main "$@"
          EOF
          chmod +x deb_build/usr/bin/filebrowser
          
          # Create .desktop entry
          cat << 'EOF' > deb_build/usr/share/applications/filebrowser.desktop
          [Desktop Entry]
          Name=Filebrowser
          Comment=Launcher de PDFs estilo Spotlight para Linux
          Exec=/usr/bin/filebrowser
          Icon=document-open
          Type=Application
          Categories=Utility;Office;
          Keywords=pdf;search;finder;documents;
          StartupNotify=false
          Terminal=false
          EOF

      - name: Build Debian Package (.deb)
        run: |
          VERSION="${{ github.ref_name || '0.2.1' }}"
          VERSION="${VERSION#v}"
          fpm -s dir -t deb \
            -n filebrowser \
            -v "$VERSION" \
            -a all \
            -d "python3 (>= 3.10)" \
            -d "python3-gi" \
            -d "gir1.2-gtk-4.0" \
            -m "Robson Cruz <robsoncruz.dev@gmail.com>" \
            --description "Launcher de PDFs estilo Spotlight para Linux" \
            -f \
            -C deb_build .

      - name: Build RPM Package (.rpm)
        run: |
          VERSION="${{ github.ref_name || '0.2.1' }}"
          VERSION="${VERSION#v}"
          fpm -s dir -t rpm \
            -n filebrowser \
            -v "$VERSION" \
            -a noarch \
            -d "python3 >= 3.10" \
            -d "python3-gobject" \
            -d "gtk4" \
            -m "Robson Cruz <robsoncruz.dev@gmail.com>" \
            --description "Launcher de PDFs estilo Spotlight para Linux" \
            -f \
            -C deb_build .

      - name: Build AppImage (.AppImage)
        run: |
          pip install python-appimage
          
          mkdir -p AppDir/opt/filebrowser
          cp -r src AppDir/opt/filebrowser/
          
          python-appimage build app --python-version 3.10 AppDir
          
          cat << 'EOF' > AppDir/AppRun
          #!/bin/bash
          HERE="$(dirname "$(readlink -f "${0}")")"
          export PYTHONPATH="${HERE}/opt/filebrowser:${PYTHONPATH}"
          exec "${HERE}/opt/python3.10/bin/python3" -m src.main "$@"
          EOF
          chmod +x AppDir/AppRun
          
          cat << 'EOF' > AppDir/filebrowser.desktop
          [Desktop Entry]
          Name=Filebrowser
          Comment=Launcher de PDFs estilo Spotlight para Linux
          Exec=AppRun
          Icon=document-open
          Type=Application
          Categories=Utility;Office;
          EOF
          
          touch AppDir/document-open.svg
          
          wget -qO linuxdeploy-x86_64.AppImage https://github.com/linuxdeploy/linuxdeploy/releases/download/continuous/linuxdeploy-x86_64.AppImage
          chmod +x linuxdeploy-x86_64.AppImage
          
          ARCH=x86_64 ./linuxdeploy-x86_64.AppImage --appdir "AppDir" --output appimage \
              --desktop-file "AppDir/filebrowser.desktop" \
              --icon-file "AppDir/document-open.svg"
          
          mv Filebrowser*.AppImage Filebrowser-${{ github.ref_name || '0.2.1' }}-x86_64.AppImage

      - name: Upload Release Assets
        if: startsWith(github.ref, 'refs/tags/') || github.event_name == 'release'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          generate_release_notes: true
          files: |
            *.deb
            *.rpm
            *.AppImage

  build_windows:
    runs-on: windows-latest
    permissions:
      contents: write
      
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up MSYS2
        uses: msys2/setup-msys2@v2
        with:
          msystem: UCRT64
          update: true
          install: >-
            mingw-w64-ucrt-x86_64-gcc
            mingw-w64-ucrt-x86_64-gtk4
            mingw-w64-ucrt-x86_64-python3
            mingw-w64-ucrt-x86_64-python-gobject
            mingw-w64-ucrt-x86_64-python-pip
            mingw-w64-ucrt-x86_64-python-cairo

      - name: Install Python Dependencies
        shell: msys2 {0}
        run: |
          pip install --no-cache-dir pyinstaller pyinstaller-hooks-contrib

      - name: Build Windows Executable
        shell: msys2 {0}
        run: |
          pyinstaller --name "filebrowser" \
            --windowed \
            --collect-all gi \
            --add-data "$(cygpath -w /ucrt64/lib/girepository-1.0);lib/girepository-1.0" \
            --add-data "$(cygpath -w /ucrt64/lib/gdk-pixbuf-2.0);lib/gdk-pixbuf-2.0" \
            --add-data "$(cygpath -w /ucrt64/share/glib-2.0/schemas);share/glib-2.0/schemas" \
            --add-data "$(cygpath -w /ucrt64/share/icons);share/icons" \
            --add-data "src/ui/styles.css;src/ui" \
            --add-data "src/locale;src/locale" \
            --hidden-import "src.i18n" \
            src/main.py

      - name: Build Windows Installer (Inno Setup)
        uses: robin24/inno-setup-action@v1
        with:
          filepath: scripts/installer.iss

      - name: Create Windows Archive
        run: |
          Compress-Archive -Path dist\filebrowser\* -DestinationPath Filebrowser-${{ github.ref_name || '0.2.1' }}-Windows.zip

      - name: Upload Windows Artifact
        uses: actions/upload-artifact@v4
        with:
          name: Filebrowser-Windows
          path: |
            Filebrowser-*.zip
            scripts/Output/Filebrowser-*-Installer.exe

      - name: Upload Windows Release Asset
        if: startsWith(github.ref, 'refs/tags/') || github.event_name == 'release'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          files: |
            Filebrowser-*.zip
            scripts/Output/Filebrowser-*-Installer.exe
